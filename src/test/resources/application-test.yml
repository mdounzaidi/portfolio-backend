spring:
  datasource:
    url: jdbc:h2:mem:portfolio_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: localhost
    port: 3025
    username: test
    password: test

app:
  base-url: http://localhost:8080
  mail:
    enabled: false
  account:
    bootstrap:
      enabled: false
  security:
    jwt:
      secret: test-jwt-secret-value-32-characters
      access-token-expiration-minutes: 30
