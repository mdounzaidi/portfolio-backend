spring:
  profiles:
    default: dev

  application:
    name: portfolio-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    time-zone: UTC

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    mail:
      enabled: false
  info:
    env:
      enabled: true

info:
  app:
    name: portfolio-backend
    description: Spring Boot portfolio backend
    java-version: 21

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  account:
    bootstrap:
      enabled: ${APP_ACCOUNT_BOOTSTRAP_ENABLED:true}
      first-name: ${APP_ACCOUNT_BOOTSTRAP_FIRST_NAME:Local}
      last-name: ${APP_ACCOUNT_BOOTSTRAP_LAST_NAME:Admin}
      username: ${APP_ACCOUNT_BOOTSTRAP_USERNAME:}
      email: ${APP_ACCOUNT_BOOTSTRAP_EMAIL:}
      password: ${APP_ACCOUNT_BOOTSTRAP_PASSWORD:}
      role: ${APP_ACCOUNT_BOOTSTRAP_ROLE:ROLE_SUPERADMIN}
  cleanup:
    tokens:
      cron: ${APP_CLEANUP_TOKENS_CRON:0 0 3 * * *}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}
      access-token-expiration-minutes: ${APP_SECURITY_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:30}
